<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>폰광판 v2.0</title>
    <meta name="google-adsense-account" content="ca-pub-3836606535500198">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3836606535500198"
         crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { touch-action: manipulation; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* ── 반응형 폰트 (vmin 기준: 좁은 쪽 기준으로 스케일) ── */
        .score-num  { font-size: clamp(2.8rem, 16vmin, 5.5rem); line-height: 1; }
        .timer-num  { font-size: clamp(1.6rem,  8vmin, 3.5rem); }
        .team-name  { font-size: clamp(0.9rem,  4vmin, 1.8rem); }
        .btn-score  { font-size: clamp(0.9rem,  3vmin, 1.4rem); }
        .pg-stroke  { font-size: clamp(2.2rem, 13vmin, 4.5rem); line-height: 1; }
        .pg-name    { font-size: clamp(0.75rem, 3vmin, 1.1rem); }

        /* ── 점수 글로우 ── */
        .glow-blue   { text-shadow: 0 0 24px rgba(96,165,250,0.45); }
        .glow-red    { text-shadow: 0 0 24px rgba(248,113,113,0.45); }
        .glow-yellow { text-shadow: 0 0 24px rgba(250,204, 21,0.45); }
        .glow-green  { text-shadow: 0 0 24px rgba( 74,222,128,0.45); }

        /* ── 버튼 press 피드백 ── */
        button { transition: transform 0.07s ease, box-shadow 0.07s ease; user-select: none; }
        button:active { transform: scale(0.91); }


        /* ═══════════════════════════════════════════════
           메인 레이아웃 (세로 / 가로 분기)
           세로(기본): center_col 하단, teams_wrapper 상단 (flex-col)
           가로(sm: 640px+): 3열 나란히 (flex-row)
        ═══════════════════════════════════════════════ */
        #main_content  { flex-direction: column; }
        #center_col    { order: 2; flex-shrink: 0; }
        #teams_wrapper { order: 1; flex: 1; display: flex; flex-direction: row; min-height: 0; }

        @media (min-width: 640px) {
            #main_content  { flex-direction: row; align-items: stretch; }
            #teams_wrapper { display: contents; }  /* 자식이 main_content 직속 자식으로 */
            #team_a_col    { order: 1; flex: 1; }
            #center_col    { order: 2; flex: 1; border-left: 1px solid #374151; border-right: 1px solid #374151; }
            #team_b_col    { order: 3; flex: 1; }
        }

        /* 세로 모드에서 두 팀 사이 구분선 */
        @media (max-width: 639px) {
            #team_a_col { border-right: 1px solid #374151; }
            #center_col { border-top: 1px solid #374151; }
        }

        /* ── 파크골프 그리드 ── */
        .pg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            flex: 1; min-height: 0;
        }
        /* 세로 모드 2×2 */
        @media (max-width: 639px) and (orientation: portrait) {
            .pg-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ── 가로 모드 폰에서 chrome 최소화 ── */
        @media (max-height: 480px) {
            #tactics_section { max-height: 72px !important; }
            #toolbar         { padding-top: 3px; padding-bottom: 3px; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col h-screen overflow-hidden font-sans">

    <!-- ── 상단 배너 (Auto Ads 자동 삽입) ── -->

    <!-- ── 툴바 ── -->
    <div id="toolbar" class="flex flex-wrap justify-center items-center gap-2 py-2 px-2 bg-gray-800 border-b border-gray-700 shrink-0">
        <select id="sportMode"
            class="bg-gray-700 text-white rounded-lg font-bold outline-none border border-gray-600 focus:border-blue-500

            <option value="football">⚽ 축구/풋살</option>
            <option value="basketball">🏀 농구</option>

            <option value="tennis">🎾 테니스</option>

                   px-2.5 py-1.5 text-sm sm:px-4 sm:py-2 sm:text-base">
            📩 제휴문의

    </div>

<script>
    // ── 오디오 ──
    let audioCtx = null;
    function getAudioCtx() {
        if (!audioCtx || audioCtx.state === 'closed')
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }
    function playClick() {
        try {
            const ctx = getAudioCtx(), osc = ctx.createOscillator(), g = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1100, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(700, ctx.currentTime + 0.06);
            g.gain.setValueAtTime(0.25, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.07);
        } catch(e) {}
    }
    function playTick() {
        try {
            const ctx = getAudioCtx(), osc = ctx.createOscillator(), g = ctx.createGain();
            osc.type = 'sine'; osc.frequency.value = 480;
            g.gain.setValueAtTime(0.08, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.05);
        } catch(e) {}
    }
    function playAlarm() {
        try {
            const ctx = getAudioCtx(), osc = ctx.createOscillator(), g = ctx.createGain();
            osc.type = 'square';
            [880,1100,880,1100].forEach((f,i) => osc.frequency.setValueAtTime(f, ctx.currentTime + i*0.5));
            g.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 3);
        } catch(e) {}
    }
    document.addEventListener('click', e => { if (e.target.closest('button')) playClick(); });

    // ── 상태 ──
    let state = {
        mode: 'football',
        scoreA: 0, scoreB: 0,
        setA: 0, setB: 0,
        tennisScores: ['0','15','30','40','AD'],
        tennisIndexA: 0, tennisIndexB: 0,
        pgHole: 1,
        pgPar: [3,4,4,5,3,4,4,5,4, 3,4,4,5,3,4,4,5,4],
        pgStrokes: [Array(18).fill(0), Array(18).fill(0), Array(18).fill(0), Array(18).fill(0)]
    };

    // ── 타이머 ──
    let timerInterval = null, totalSeconds = 15*60, isRunning = false;

    function updateTimerDisplay() {
        document.getElementById('min').innerText = String(Math.floor(totalSeconds/60)).padStart(2,'0');
        document.getElementById('sec').innerText = String(totalSeconds%60).padStart(2,'0');
    }
    function editTimer() {
        if (isRunning) return;
        const m = prompt("분을 입력하세요", Math.floor(totalSeconds/60));
        const s = prompt("초를 입력하세요", totalSeconds%60);
        if (m !== null && s !== null && !isNaN(m) && !isNaN(s)) {
            totalSeconds = parseInt(m)*60 + parseInt(s);
            updateTimerDisplay();
        }
    }
    function startTimer() {
        if (isRunning) {
            clearInterval(timerInterval); isRunning = false;
            document.getElementById('btnStart').innerText = "시작";
            document.getElementById('btnStart').classList.replace('bg-yellow-600','bg-green-600');
        } else {
            if (totalSeconds <= 0) return;
            isRunning = true;
            document.getElementById('btnStart').innerText = "정지";
            document.getElementById('btnStart').classList.replace('bg-green-600','bg-yellow-600');
            timerInterval = setInterval(() => {
                totalSeconds--;
                updateTimerDisplay();
                playTick();
                if (totalSeconds <= 0) {
                    clearInterval(timerInterval); isRunning = false;
                    document.getElementById('btnStart').innerText = "시작";
                    document.getElementById('btnStart').classList.replace('bg-yellow-600','bg-green-600');
                    playAlarm();
                }
            }, 1000);
        }
    }
    function resetTimer() {
        clearInterval(timerInterval); isRunning = false;
        totalSeconds = 15*60; updateTimerDisplay();
        document.getElementById('btnStart').innerText = "시작";
        document.getElementById('btnStart').classList.replace('bg-yellow-600','bg-green-600');
    }

    // ── 득점 ──
    function updateScoreDisplay() {
        if (state.mode === 'tennis') {
            let sa = state.tennisScores[state.tennisIndexA];
            let sb = state.tennisScores[state.tennisIndexB];
            if (state.tennisIndexA === 4 && state.tennisIndexB === 4) {
                state.tennisIndexA = 3; state.tennisIndexB = 3; sa = sb = '40';
            }
            if (state.tennisIndexA === 3 && state.tennisIndexB === 3) { sa = sb = '40'; }
            document.getElementById('teamA_score').innerText = sa;
            document.getElementById('teamB_score').innerText = sb;
        } else {
            document.getElementById('teamA_score').innerText = state.scoreA;
            document.getElementById('teamB_score').innerText = state.scoreB;
        }
    }
    function updatePgDisplay() {
        const sIds = ['pg_strokeA','pg_strokeB','pg_strokeC','pg_strokeD'];
        const tIds = ['pg_totalA', 'pg_totalB', 'pg_totalC', 'pg_totalD'];
        const h = state.pgHole - 1;
        state.pgStrokes.forEach((arr,i) => {
            document.getElementById(sIds[i]).innerText = arr[h];
            document.getElementById(tIds[i]).innerText = arr.reduce((a,b)=>a+b,0);
        });
    }
    function changePgScore(idx, val) {
        const h = state.pgHole - 1;
        state.pgStrokes[idx][h] = Math.max(0, state.pgStrokes[idx][h] + val);
        updatePgDisplay();
    }
    function changeScore(team, val) {
        if (state.mode === 'tennis') {
            if (team==='A') { state.tennisIndexA = Math.max(0,Math.min(4,state.tennisIndexA+val)); }
            else            { state.tennisIndexB = Math.max(0,Math.min(4,state.tennisIndexB+val)); }
        } else {
            if (team==='A') state.scoreA = Math.max(0, state.scoreA+val);
            if (team==='B') state.scoreB = Math.max(0, state.scoreB+val);
        }
        updateScoreDisplay();
    }
    function changeSet(team, val) {
        if (team==='A') state.setA = Math.max(0, state.setA+val);
        if (team==='B') state.setB = Math.max(0, state.setB+val);
        document.getElementById('setA').innerText = state.setA;
        document.getElementById('setB').innerText = state.setB;
    }
    function changeHole(val) {
        state.pgHole = ((state.pgHole - 1 + val + 18) % 18) + 1;
        document.getElementById('pg_hole').innerText = state.pgHole + ' HOLE';
        document.getElementById('pg_par').innerText  = state.pgPar[state.pgHole-1];
        updatePgDisplay();
    }
    function setPar(val) {
        state.pgPar[state.pgHole-1] = val;
        document.getElementById('pg_par').innerText = val;
    }

    // ── 종목 변경 ──
    document.getElementById('sportMode').addEventListener('change', e => {
        state.mode = e.target.value;
        state.scoreA = state.scoreB = state.setA = state.setB = 0;
        state.tennisIndexA = state.tennisIndexB = 0;
        document.getElementById('setA').innerText = 0;
        document.getElementById('setB').innerText = 0;

        const mainContent  = document.getElementById('main_content');
        const pgMain       = document.getElementById('pg_main_section');
        const btnA_def     = document.getElementById('teamA_btns_default');
        const btnB_def     = document.getElementById('teamB_btns_default');
        const btnA_bb      = document.getElementById('teamA_btns_basketball');
        const btnB_bb      = document.getElementById('teamB_btns_basketball');
        const setSection   = document.getElementById('set_score_section');
        const tacticsSec   = document.getElementById('tactics_section');
        const periodText   = document.getElementById('center_period');
        const timerSec     = document.getElementById('timer_section');

        // 공통 초기화
        mainContent.classList.remove('hidden');
        pgMain.classList.add('hidden');
        btnA_bb.classList.add('hidden'); btnB_bb.classList.add('hidden');
        btnA_def.classList.remove('hidden'); btnB_def.classList.remove('hidden');
        setSection.classList.add('hidden');
        tacticsSec.classList.remove('hidden');
        periodText.classList.remove('hidden');
        timerSec.classList.remove('hidden');
        document.getElementById('period_text').value = "전/후반";

        if (state.mode === 'basketball') {
            btnA_def.classList.add('hidden'); btnB_def.classList.add('hidden');
            btnA_bb.classList.remove('hidden'); btnB_bb.classList.remove('hidden');
            document.getElementById('period_text').value = "1쿼터";
            drawCourt('wood');
        } else if (state.mode === 'tabletennis' || state.mode === 'tennis') {
            setSection.classList.remove('hidden');
            tacticsSec.classList.add('hidden');
        } else if (state.mode === 'parkgolf') {
            mainContent.classList.add('hidden');
            pgMain.classList.remove('hidden');
            tacticsSec.classList.add('hidden');
            state.pgHole = 1;
            state.pgStrokes = [Array(18).fill(0),Array(18).fill(0),Array(18).fill(0),Array(18).fill(0)];
            document.getElementById('pg_hole').innerText = "1 HOLE";
            document.getElementById('pg_par').innerText  = state.pgPar[0];
            updatePgDisplay();
        } else {
            drawCourt('green');
        }
        updateScoreDisplay();
    });

    // ── 작전판 (Canvas) ──
    const canvas = document.getElementById('tBoard');
    const ctx    = canvas.getContext('2d');
    let players = [], isDragging = false, dragTarget = null;

    function resizeCanvas() {
        canvas.width  = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        drawCourt(state.mode === 'basketball' ? 'wood' : 'green');
        drawPlayers();
    }
    window.addEventListener('resize', resizeCanvas);

    function drawCourt(type) {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (type === 'green') {
            ctx.fillStyle = '#1a4a1e'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle='#4ade80'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width/2,canvas.height/2,Math.min(40,canvas.height*0.3),0,Math.PI*2); ctx.stroke();
        } else {
            ctx.fillStyle = '#c8bfb7'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle='#5c3d2e'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width/2,canvas.height/2,Math.min(30,canvas.height*0.25),0,Math.PI*2); ctx.stroke();
        }
    }
    function initTacticsBoard() {
        const count = parseInt(document.getElementById('playerCount').value) || 5;
        players = [];
        const r = Math.min(12, canvas.height * 0.12);
        for (let i=0; i<count; i++) players.push({x:50+(i*10), y:canvas.height/2, color:'#3b82f6', r});
        for (let i=0; i<count; i++) players.push({x:canvas.width-50-(i*10), y:canvas.height/2, color:'#ef4444', r});
        players.push({x:canvas.width/2, y:canvas.height/2, color:'#ffffff', r:Math.min(8,r*0.7)});
        drawCourt(state.mode==='basketball'?'wood':'green');
        drawPlayers();
    }
    function drawPlayers() {
        players.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=p.color; ctx.fill();
            ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke();
        });
    }
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const src  = e.touches ? e.touches[0] : e;
        return { x: src.clientX-rect.left, y: src.clientY-rect.top };
    }
    function startDrag(e) {
        e.preventDefault();
        const p = getPos(e);
        dragTarget = players.find(pl => Math.hypot(pl.x-p.x, pl.y-p.y) < pl.r*1.6);
        if (dragTarget) isDragging = true;
    }
    function doDrag(e) {
        if (!isDragging || !dragTarget) return;
        e.preventDefault();
        const p = getPos(e);
        dragTarget.x = p.x; dragTarget.y = p.y;
        drawCourt(state.mode==='basketball'?'wood':'green'); drawPlayers();
    }
    function stopDrag() { isDragging = false; dragTarget = null; }

    canvas.addEventListener('mousedown',  startDrag);
    canvas.addEventListener('mousemove',  doDrag);
    canvas.addEventListener('mouseup',    stopDrag);
    canvas.addEventListener('mouseleave', stopDrag);
    canvas.addEventListener('touchstart', startDrag, {passive:false});
    canvas.addEventListener('touchmove',  doDrag,    {passive:false});
    canvas.addEventListener('touchend',   stopDrag);

    // ── 음성 인식 ──
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null, isVoiceActive = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true; recognition.lang = 'ko-KR'; recognition.interimResults = false;
        recognition.onresult = e => {
            const t = e.results[e.results.length-1][0].transcript;
            processVoiceCommand(t);
        };
        recognition.onend = () => { if (isVoiceActive) try { recognition.start(); } catch(e) {} };
        recognition.onerror = e => console.error("음성 오류:", e.error);
    }

    function toggleVoiceRecognition() {
        if (!recognition) { alert("크롬 브라우저를 이용해주세요!"); return; }
        const btn = document.getElementById('btnVoice');
        if (isVoiceActive) {
            isVoiceActive = false; recognition.stop();
            btn.innerHTML = "🎤 음성인식";
            btn.classList.replace('bg-red-600','bg-gray-700');
            btn.classList.replace('hover:bg-red-500','hover:bg-gray-600');
        } else {
            isVoiceActive = true; try { recognition.start(); } catch(e) {}
            btn.innerHTML = "🎙️ 듣는 중...";
            btn.classList.replace('bg-gray-700','bg-red-600');
            btn.classList.replace('hover:bg-gray-600','hover:bg-red-500');
        }
    }

    function processVoiceCommand(text) {
        const t = text.replace(/\s+/g,'').toLowerCase();
        let team = null;
        if (/(홈|에이|a|블루|왼쪽)/.test(t))       team = 'A';
        else if (/(어웨이|원정|비|b|레드|오른쪽)/.test(t)) team = 'B';
        if (!team) return;
        let val = 1;
        if (/(2점|이점)/.test(t))             val = 2;
        else if (/(3점|삼점)/.test(t))         val = 3;
        else if (/(빼|마이너스|취소|감점)/.test(t)) val = -1;
        changeScore(team, val);
    }

    // ── 제휴 문의 ──
    function closeContactModal() {
        document.getElementById('contactModal').classList.add('hidden');
        document.getElementById('contactForm').classList.remove('hidden');
        document.getElementById('contactSuccess').classList.add('hidden');
        document.getElementById('contactForm').reset();
    }
    async function handleFormSubmit(e) {
        e.preventDefault();
        const form = e.target;
        const btn  = form.querySelector('button[type="submit"]');
        btn.disabled = true; btn.innerText = '전송 중...';
        try {
            const res = await fetch(form.action, {
                method: 'POST', body: new FormData(form), headers: {'Accept':'application/json'}
            });
            if (res.ok) {
                form.classList.add('hidden');
                document.getElementById('contactSuccess').classList.remove('hidden');
            } else {
                alert('전송에 실패했습니다.'); btn.disabled = false; btn.innerText = '전송하기';
            }
        } catch {
            alert('네트워크 오류가 발생했습니다.'); btn.disabled = false; btn.innerText = '전송하기';
        }
    }

    // ── 초기화 ──
    setTimeout(() => { resizeCanvas(); initTacticsBoard(); updateTimerDisplay(); }, 100);
</script>
</body>
</html>
